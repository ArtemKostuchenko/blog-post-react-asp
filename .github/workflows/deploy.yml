name: Deploy project

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Login GHCR
        run: echo ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin
      - name: Build API
        run: |
          docker build \
          -t ghcr.io/artemkostuchenko/blog-post-api:${{ github.sha }} \
          -t ghcr.io/artemkostuchenko/blog-post-api:latest \
          ./TestWebApi
      - name: Push API
        run: |
          docker push ghcr.io/artemkostuchenko/blog-post-api:${{ github.sha }}
          docker push ghcr.io/artemkostuchenko/blog-post-api:latest
      - name: Build Front
        run: |
          docker build \
          -t ghcr.io/artemkostuchenko/blog-post-front:${{ github.sha }} \
          -t ghcr.io/artemkostuchenko/blog-post-front:latest \
          ./blogpost.application
      - name: Push Front
        run: |
          docker push ghcr.io/artemkostuchenko/blog-post-front:${{ github.sha }}
          docker push ghcr.io/artemkostuchenko/blog-post-front:latest
  deploy:
    needs: delivery
    runs-on: self-hosted
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Login GHCR
        run: echo ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin
      - name: Pull latest images
        run: docker compose -f ~/blog/docker-compose.yml pull
      - name: Deploy containers
        run: docker compose -f ~/blog/docker-compose.yml up -d
