name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install dependencies
        run: dotnet restore
        working-directory: TestWebApi
      - name: Build project
        run: dotnet build --no-restore
        working-directory: TestWebApi
      - name: Run tests
        run: dotnet test --no-build
        working-directory: TestWebApi
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Setup Node environment
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: blogpost.application
      - name: Run tests
        run: npm run test
        working-directory: blogpost.application
      - name: Run lint
        run: npm run lint
        working-directory: blogpost.application
